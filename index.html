<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>quentinJS demo</title>
		<style>
			:root {
				--bg: #0f172a;
				--card: #111827;
				--text: #e5e7eb;
				--muted: #9ca3af;
				--border: #334155;
				--accent: #38bdf8;
				--red: #f87171;
				--green: #4ade80;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI,
					Roboto, Helvetica, Arial;
				background: radial-gradient(circle at top, #1e293b, var(--bg));
				color: var(--text);
				display: grid;
				place-items: center;
				padding: 24px;
			}

			.card {
				width: min(760px, 100%);
				background: color-mix(in oklab, var(--card), black 20%);
				border: 1px solid var(--border);
				border-radius: 16px;
				padding: 24px;
				box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
			}

			h1 {
				margin: 0 0 6px;
				font-size: 1.4rem;
			}

			p {
				margin: 0 0 20px;
				color: var(--muted);
			}

			.list {
				list-style: none;
				padding: 0;
				margin: 0 0 20px;
				display: grid;
				gap: 8px;
			}

			.item {
				padding: 10px 12px;
				border: 1px solid var(--border);
				border-radius: 10px;
				background: #0b1220;
				transition: transform 120ms ease, border-color 120ms ease;
			}

			.item:hover {
				transform: translateX(2px);
				border-color: #475569;
			}

			.controls {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
			}

			button {
				border: 1px solid var(--border);
				background: #1f2937;
				color: var(--text);
				padding: 8px 12px;
				border-radius: 10px;
				cursor: pointer;
				font-size: 0.9rem;
			}

			button:hover {
				border-color: var(--accent);
			}

			.red {
				color: var(--red);
			}

			.green {
				color: var(--green);
			}
		</style>
	</head>
	<body>
		<main class="card">
			<h1>quentinJS demo</h1>
			<p>Play with class toggling and element targeting.</p>

			<ul class="list">
				<li data-foo="bar" data-info="information" class="item first">item 1</li>
				<li data-info="secondary-information" class="item second">item 2</li>
				<li class="item third">item 3</li>
				<li class="item fourth">item 4</li>
				<li class="item fifth">item 5</li>
			</ul>

			<div class="controls">
				<button onclick="classy('red')">toggle all red</button>
				<button onclick="classy('green')">toggle all green</button>
				<button onclick="firstRed()">toggle first red</button>
				<button onclick="lastRed()">toggle last red</button>
				<button onclick="thirdRed()">toggle third red</button>
			</div>
		</main>

		<script src="quentin.js"></script>
		<script>
			const $items = q("li");
			function classy(name) {
				$items.toggleClass(name);
			}
			function firstRed() {
				$items.first().toggleClass("red");
			}
			function lastRed() {
				$items.last().toggleClass("red");
			}
			function thirdRed() {
				$items.eq(2).toggleClass("red");
			}
		</script>
	</body>
</html>
