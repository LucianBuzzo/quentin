<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>quentinJS demo</title>
		<style>
			:root {
				--bg: #0f172a;
				--card: #111827;
				--text: #e5e7eb;
				--muted: #9ca3af;
				--border: #334155;
				--accent: #38bdf8;
				--red: #f87171;
				--green: #4ade80;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI,
					Roboto, Helvetica, Arial;
				background: radial-gradient(circle at top, #1e293b, var(--bg));
				color: var(--text);
				display: grid;
				place-items: center;
				padding: 24px;
			}

			.card {
				width: min(860px, 100%);
				background: color-mix(in oklab, var(--card), black 20%);
				border: 1px solid var(--border);
				border-radius: 16px;
				padding: 24px;
				box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
				display: grid;
				gap: 16px;
			}

			h1 {
				margin: 0 0 6px;
				font-size: 1.4rem;
			}

			p {
				margin: 0;
				color: var(--muted);
			}

			.layout {
				display: grid;
				gap: 16px;
				grid-template-columns: 1.4fr 1fr;
			}

			@media (max-width: 760px) {
				.layout {
					grid-template-columns: 1fr;
				}
			}

			.list {
				list-style: none;
				padding: 0;
				margin: 0;
				display: grid;
				gap: 8px;
			}

			.item {
				padding: 10px 12px;
				border: 1px solid var(--border);
				border-radius: 10px;
				background: #0b1220;
				transition: transform 120ms ease, border-color 120ms ease;
			}

			.item:hover {
				transform: translateX(2px);
				border-color: #475569;
			}

			.controls {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				margin-top: 12px;
			}

			button {
				border: 1px solid var(--border);
				background: #1f2937;
				color: var(--text);
				padding: 8px 12px;
				border-radius: 10px;
				cursor: pointer;
				font-size: 0.9rem;
			}

			button:hover {
				border-color: var(--accent);
			}

			.panel {
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 12px;
				background: #0b1220;
				display: grid;
				gap: 10px;
			}

			.kbd {
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
					Liberation Mono, Courier New, monospace;
				font-size: 0.8rem;
				padding: 1px 6px;
				border: 1px solid #475569;
				border-radius: 6px;
				background: #0f172a;
			}

			pre {
				margin: 0;
				padding: 10px;
				border-radius: 8px;
				overflow: auto;
				background: #0f172a;
				border: 1px solid var(--border);
				font-size: 0.8rem;
				line-height: 1.35;
			}

			.red {
				color: var(--red);
			}

			.green {
				color: var(--green);
			}
		</style>
	</head>
	<body>
		<main class="card">
			<header>
				<h1>quentinJS demo</h1>
				<p>
					Play with class toggling, keyboard shortcuts, and live dataset output.
				</p>
			</header>

			<section class="layout">
				<div>
					<ul class="list" id="items-list">
						<li data-foo="bar" data-info="information" class="item first">item 1</li>
						<li data-info="secondary-information" class="item second">item 2</li>
						<li class="item third">item 3</li>
						<li class="item fourth">item 4</li>
						<li class="item fifth">item 5</li>
					</ul>

					<div class="controls">
						<button onclick="classy('red')">toggle all red</button>
						<button onclick="classy('green')">toggle all green</button>
						<button onclick="toggleNth(1)">toggle 1st red</button>
						<button onclick="toggleNth(3)">toggle 3rd red</button>
						<button onclick="toggleNth(5)">toggle 5th red</button>
						<button onclick="clearColors()">clear colors</button>
					</div>
				</div>

				<aside class="panel">
					<strong>Keyboard</strong>
					<div>
						<span class="kbd">1</span>/<span class="kbd">2</span>/<span class="kbd">3</span>
						→ toggle 1st/2nd/3rd red
					</div>
					<div><span class="kbd">R</span> toggle all red</div>
					<div><span class="kbd">G</span> toggle all green</div>
					<div><span class="kbd">C</span> clear colors</div>

					<strong>Live dataset</strong>
					<pre id="dataset-view">{}</pre>
				</aside>
			</section>
		</main>

		<script src="quentin.js"></script>
		<script>
			const $items = q("li");
			const datasetView = document.getElementById("dataset-view");

			function renderDataset() {
				const allData = $items.dataAll();
				datasetView.textContent = JSON.stringify(allData, null, 2);
			}

			function classy(name) {
				$items.toggleClass(name);
				renderDataset();
			}

			function toggleNth(n) {
				$items.eq(n - 1).toggleClass("red");
				renderDataset();
			}

			function clearColors() {
				$items.removeClass("red").removeClass("green");
				renderDataset();
			}

			document.addEventListener("keydown", (event) => {
				const key = event.key.toLowerCase();
				if (key === "r") classy("red");
				if (key === "g") classy("green");
				if (key === "c") clearColors();
				if (key === "1") toggleNth(1);
				if (key === "2") toggleNth(2);
				if (key === "3") toggleNth(3);
			});

			renderDataset();
		</script>
	</body>
</html>
